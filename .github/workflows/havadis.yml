name: havadis-yayin

# Üretim yerelde (sabah.sh, launchd 06:47) yapılır ve push'lanır;
# bu workflow yalnızca site/ klasörünü GitHub Pages'e yayınlar.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  yayinla:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.yayin.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - id: yayin
        uses: actions/deploy-pages@v5
      - name: Hata alarmı
        if: failure()
        run: |
          curl -sf -H "Priority: high" -H "Tags: rotating_light" \
            -d "Havadis yayınlanamadı (Pages) — Actions loguna bak." \
            "https://ntfy.sh/${{ secrets.NTFY_TOPIC }}" || true
