<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>try{var t=localStorage.getItem("havadis-tema");if(t)document.documentElement.dataset.tema=t}catch(e){}</script>
<title>Havadis Wiki — bağ haritası</title>
<meta name="description" content="Havadis'in haberlerden damıtılan bilgi ağı: varlıklar, ilişkiler, kronolojik gelişim zincirleri ve arşive bağlı soru-cevap.">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#F6F1E5">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#16120C">
<link rel="stylesheet" href="../varliklar/fontlar/fontlar.css">
<link rel="stylesheet" href="../varliklar/stil.css">
<link rel="stylesheet" href="wiki.css">
<link rel="icon" type="image/svg+xml" href="../ikon.svg">
</head>
<body class="wiki-govde">

<canvas id="ag" aria-label="Varlıklar ve ilişkiler ağı — bir düğüme dokun"></canvas>

<div class="ust-sol">
  <div class="marka-satir">
    <a class="marka" href="../index.html" title="Bugünkü sayıya dön">HAVADİS</a>
    <span class="rota">Wiki</span>
    <span class="bosluk"></span>
    <button class="mini-dugme ses-dugme" type="button" aria-label="Arayüz seslerini aç/kapat">🔊</button>
    <button class="mini-dugme tema-dugme" type="button" aria-label="Açık/koyu tema">☾</button>
  </div>
  <input class="arama-kutusu" id="arama" type="search" placeholder="Ara… ( / )"
         autocomplete="off" aria-label="Wiki'de varlık ara" role="combobox"
         aria-expanded="true" aria-controls="sonuc-listesi">
  <ul id="sonuc-listesi" role="listbox" aria-label="Arama sonuçları"></ul>
  <p class="sayim" id="sayim">yükleniyor…</p>
</div>

<div class="lejant" id="lejant" role="list" aria-label="Tür renkleri"></div>

<div class="ipucu" id="ipucu"></div>

<aside class="detay" id="detay" aria-live="polite">
  <button class="kapat" id="kapat" type="button" aria-label="Paneli kapat">✕</button>
  <span class="tur-rozet" id="detay-tur"></span>
  <h2 id="detay-ad"></h2>
  <p class="tanim" id="detay-tanim"></p>
  <div class="govde" id="detay-govde"></div>
  <div class="kunye" id="detay-baglar"></div>
  <h4 class="bolum-baslik">Gelişim zinciri</h4>
  <ol class="zaman-cizgisi" id="detay-zaman"></ol>
  <div class="kunye" id="detay-linkler"></div>
</aside>

<div class="sohbet-dok" id="sohbet-dok">
  <button type="button" id="sohbet-ac">💬 Havadis'e sor</button>
</div>
<div class="sohbet-panel" id="sohbet-panel">
  <div class="sohbet-baslik">
    <strong>Havadis'e sor</strong>
    <p class="kucuk" id="kopru-durum">arşiv senteziyle</p>
    <button class="mini-dugme" id="sohbet-kapat" type="button" aria-label="Sohbeti kapat">✕</button>
  </div>
  <div class="sohbet-satir">
    <input class="arama-kutusu" id="soru" type="text" autocomplete="off"
           placeholder="Ör: ChatGPT'de son neler oldu?" aria-label="Sorunu yaz">
    <button class="sor-dugme" id="sor-dugme" type="button">Sor</button>
  </div>
  <div id="cevap"></div>
</div>

<script src="wiki.js"></script>
</body>
</html>
